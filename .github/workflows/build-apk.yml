name: Build APK

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/public/manifest.webmanifest'
      - 'apps/web/public/icon-192.png'
      - 'apps/web/public/icon.svg'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Generate keystore
        run: |
          keytool -genkey -v \
            -keystore android.keystore \
            -alias ai2work \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass ai2work -keypass ai2work \
            -dname "CN=AI2Work, OU=AtlasNexus, O=AtlasNexus, L=Paris, ST=France, C=FR"

      - name: Create TWA config
        run: |
          cat > twa-manifest.json << 'EOF'
          {
            "packageId": "tech.atlasnexus.ai2work",
            "host": "ai2work.onrender.com",
            "name": "AI2Work",
            "launcherName": "AI2Work",
            "display": "standalone",
            "themeColor": "#0C0E1A",
            "navigationColor": "#0C0E1A",
            "backgroundColor": "#090B12",
            "startUrl": "/",
            "iconUrl": "https://ai2work.onrender.com/icon-192.png",
            "maskableIconUrl": "https://ai2work.onrender.com/icon-192.png",
            "monochromeIconUrl": "https://ai2work.onrender.com/icon.svg",
            "splashScreenFadeOutDuration": 300,
            "signingKey": {
              "path": "./android.keystore",
              "alias": "ai2work"
            },
            "appVersionName": "1.0.0",
            "appVersionCode": 1,
            "shortcuts": [],
            "generatorApp": "bubblewrap-cli",
            "webManifestUrl": "https://ai2work.onrender.com/manifest.webmanifest",
            "fallbackType": "customtabs",
            "features": {
              "locationDelegation": { "enabled": false }
            },
            "alphaDependencies": { "enabled": false },
            "enableSiteSettingsShortcut": true,
            "isChromeOSOnly": false,
            "isMetaQuest": false,
            "fullScopeUrl": "https://ai2work.onrender.com/",
            "minSdkVersion": 19,
            "orientation": "default",
            "fingerprints": [],
            "additionalTrustedOrigins": [],
            "retainUpdatedState": true
          }
          EOF

      - name: Build APK
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
        run: |
          printf 'n\n' | bubblewrap build || true
          find . -name "*.apk" -exec cp {} ai2work.apk \;
          ls -lh ai2work.apk || echo "APK not found — trying direct build..."
          # Fallback: run gradle directly
          if [ ! -f ai2work.apk ]; then
            cd app
            ./gradlew assembleRelease
            find . -name "*.apk" -exec cp {} ../ai2work.apk \;
            ls -lh ../ai2work.apk
          fi

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-latest
          name: "AI2Work APK"
          body: "Latest AI2Work Android APK — scan QR code on install page to download"
          files: ai2work.apk
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
