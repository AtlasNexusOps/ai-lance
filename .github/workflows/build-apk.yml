name: Build APK

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/android/**'
      - 'apps/web/public/manifest.webmanifest'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate keystore
        run: |
          keytool -genkey -v \
            -keystore apps/web/android/release.keystore \
            -alias ai2work \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass ai2work -keypass ai2work \
            -dname "CN=AI2Work, OU=AtlasNexus, O=AtlasNexus, L=Paris, ST=France, C=FR"

      - name: Setup Gradle
        run: |
          cd apps/web/android
          chmod +x gradlew 2>/dev/null || true
          # Download gradle wrapper if not present
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version 8.5
          fi

      - name: Build APK
        run: |
          cd apps/web/android
          ./gradlew assembleRelease 2>&1
          find . -name "*.apk" -exec ls -lh {} \;
          APK=$(find . -name "*.apk" -not -path "*/unsigned/*" -not -path "*/unaligned/*" | head -1)
          cp "$APK" ../../ai2work.apk
          ls -lh ../../ai2work.apk

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-latest
          name: "AI2Work APK"
          body: "Latest AI2Work Android APK — Trusted Web Activity wrapper"
          files: ai2work.apk
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
