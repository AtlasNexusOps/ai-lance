name: Build APK

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/android/**'
      - '.github/workflows/build-apk.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        run: |
          export ANDROID_HOME=$HOME/android-sdk
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          mkdir -p $ANDROID_HOME/cmdline-tools
          cd $ANDROID_HOME/cmdline-tools
          curl -sL -o tools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q tools.zip
          mv cmdline-tools latest 2>/dev/null || true
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Build release APK
        working-directory: apps/web/android
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: ai2work-apk
          path: apps/web/android/app/build/outputs/apk/release/*.apk

      - name: Create/Update Release
        run: |
          APK_DIR="apps/web/android/app/build/outputs/apk/release"
          # Rename to match expected URL
          cp "$APK_DIR"/app-release.apk "$APK_DIR"/ai2work.apk
          # Delete existing tag if present
          gh release delete v1.0.0 --yes 2>/dev/null || true
          git tag -d v1.0.0 2>/dev/null || true
          git push origin :refs/tags/v1.0.0 2>/dev/null || true
          # Create new release
          gh release create v1.0.0 "$APK_DIR/ai2work.apk" \
            --title "AI2Work v1.0.0" \
            --notes "Trusted Web Activity APK — native Android wrapper for ai2work.onrender.com"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
