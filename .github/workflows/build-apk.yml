name: Build APK

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/android/**'
      - '.github/workflows/build-apk.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Build release APK
        working-directory: apps/web/android
        run: ./gradlew assembleRelease

      - name: Find APK
        id: apk
        run: |
          APK=$(find apps/web/android/app/build/outputs/apk/release -name '*.apk' | head -1)
          echo "path=$APK" >> $GITHUB_OUTPUT
          echo "APK found: $APK"

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.apk.outputs.path }}
          tag_name: v1.0.0
          name: "AI2Work v1.0.0"
          body: "Trusted Web Activity APK — wraps ai2work.onrender.com as a native Android app."
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
