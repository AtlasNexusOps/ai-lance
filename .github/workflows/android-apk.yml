name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build Next.js static export
        working-directory: apps/web
        run: |
          pnpm build
          # Ensure next.config.ts has output: "export" for static generation

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platforms;android-34 build-tools;34.0.0"

      - name: Install Capacitor
        working-directory: apps/web
        run: pnpm add -D @capacitor/cli @capacitor/core @capacitor/android

      - name: Add Android platform
        working-directory: apps/web
        run: npx cap add android

      - name: Sync web assets
        working-directory: apps/web
        run: npx cap sync android

      - name: Build APK
        working-directory: apps/web/android
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ai2work-debug
          path: apps/web/android/app/build/outputs/apk/debug/app-debug.apk
