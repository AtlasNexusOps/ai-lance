plugins {
    id 'com.android.application'
}

android {
    namespace 'tech.atlasnexus.ai2work'
    compileSdk 34

    defaultConfig {
        applicationId "tech.atlasnexus.ai2work"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0.0"
    }

    signingConfigs {
        release {
            storeFile file(rootProject.file("release.keystore"))
            storePassword "ai2work"
            keyAlias "ai2work"
            keyPassword "ai2work"
        }
    }

    buildTypes {
        release {
            minifyEnabled true
            shrinkResources true
            signingConfig signingConfigs.release
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt')
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.5.0'
}
